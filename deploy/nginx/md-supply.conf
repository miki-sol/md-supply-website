# Nginx reverse proxy для MD Supply (Next.js standalone на 127.0.0.1:3000).
# После настройки домена выполните certbot — он автоматически добавит SSL-блок и редирект на HTTPS.

server {
    listen 80;
    listen [::]:80;

    # Замените на ваш домен (или _ для приёма любого хоста до настройки домена)
    server_name mdsupply.by www.mdsupply.by;

    # Кэш статики Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}
