name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  APP_DIR: /opt/md-supply

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: md-supply:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tarball
        run: docker save md-supply:latest | gzip > image.tgz

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "image.tgz,docker-compose.yml,Caddyfile"
          target: ${{ env.APP_DIR }}

      - name: Load image and (re)start
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            cd ${{ env.APP_DIR }}
            gunzip -c image.tgz | docker load
            rm -f image.tgz
            # Останавливаем свой стек и сносим любые застрявшие контейнеры на портах 80/443
            docker compose down --remove-orphans 2>/dev/null || true
            docker ps --filter "publish=80" -q | xargs -r docker rm -f
            docker ps --filter "publish=443" -q | xargs -r docker rm -f
            docker compose up -d --force-recreate
            docker image prune -f
            echo "Deployed ${{ github.sha }}"
