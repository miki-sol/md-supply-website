name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  APP_DIR: /opt/md-supply

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (standalone)
        run: pnpm build

      - name: Assemble release bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp ecosystem.config.cjs .next/standalone/ecosystem.config.cjs
          tar -C .next/standalone -czf release.tgz .

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: release.tgz
          target: /tmp

      - name: Release and reload
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            APP_DIR=${{ env.APP_DIR }}
            RELEASE="$APP_DIR/releases/${{ github.sha }}"

            mkdir -p "$RELEASE"
            tar -xzf /tmp/release.tgz -C "$RELEASE"
            rm -f /tmp/release.tgz

            ln -sfn "$RELEASE" "$APP_DIR/current"

            cd "$APP_DIR"
            pm2 startOrReload "$APP_DIR/current/ecosystem.config.cjs" --update-env
            pm2 save

            # Оставляем 5 последних релизов
            ls -1dt "$APP_DIR"/releases/*/ | tail -n +6 | xargs -r rm -rf

            echo "Deployed ${{ github.sha }}"
